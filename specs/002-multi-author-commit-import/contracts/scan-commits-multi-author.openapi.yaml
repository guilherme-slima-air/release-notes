openapi: 3.0.3
info:
  title: Release Notes Hub - Scan Commits Multi-Author
  version: 1.0.0
paths:
  /api/scan-commits:
    post:
      summary: Search commits by one or multiple authors
      description: Returns a consolidated list of commits for the informed authors in a local repository.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repo_path]
              properties:
                repo_path:
                  type: string
                  minLength: 1
                author_email:
                  type: string
                  format: email
                  description: Legacy single-author field (backward compatible).
                author_emails:
                  type: array
                  minItems: 1
                  uniqueItems: true
                  items:
                    type: string
                    format: email
                  description: Multi-author list for consolidated search.
                since:
                  type: string
                  format: date
                until:
                  type: string
                  format: date
                branch:
                  type: string
      responses:
        '200':
          description: Consolidated commit results.
          content:
            application/json:
              schema:
                type: object
                required: [commits]
                properties:
                  commits:
                    type: array
                    items:
                      type: object
                      required: [hash, author_name, author_email, subject, authored_at, metadata_items]
                      properties:
                        hash:
                          type: string
                        author_name:
                          type: string
                        author_email:
                          type: string
                        subject:
                          type: string
                        authored_at:
                          type: string
                        metadata_items:
                          type: array
                          items:
                            type: object
                            required: [name, type]
                            properties:
                              name:
                                type: string
                              type:
                                type: string
        '400':
          description: Invalid request payload.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
        '500':
          description: Repository/git execution error.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
