openapi: 3.0.3
info:
  title: Release Notes Hub - Multi-Commit Metadata Import
  version: 1.0.0
paths:
  /api/metadata-from-commits:
    post:
      summary: Import metadata candidates from multiple commits
      description: Reads changed files for each commit hash in a local repository and returns merged metadata candidates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repo_path, commit_hashes]
              properties:
                repo_path:
                  type: string
                  minLength: 1
                  description: Absolute or valid local path to a git repository.
                commit_hashes:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    type: string
                    pattern: "^[0-9a-fA-F]{7,40}$"
      responses:
        '200':
          description: Commit metadata successfully aggregated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - commit_hashes
                  - commits_read
                  - total_files
                  - total_metadata
                  - duplicate_metadata
                  - metadata_items
                  - commits
                properties:
                  commit_hashes:
                    type: array
                    items:
                      type: string
                  commits_read:
                    type: integer
                    minimum: 0
                  total_files:
                    type: integer
                    minimum: 0
                  total_metadata:
                    type: integer
                    minimum: 0
                  duplicate_metadata:
                    type: integer
                    minimum: 0
                  metadata_items:
                    type: array
                    items:
                      type: object
                      required: [name, type]
                      properties:
                        name:
                          type: string
                        type:
                          type: string
                  commits:
                    type: array
                    items:
                      type: object
                      required: [commit_hash, total_files, total_metadata]
                      properties:
                        commit_hash:
                          type: string
                        total_files:
                          type: integer
                          minimum: 0
                        total_metadata:
                          type: integer
                          minimum: 0
        '400':
          description: Invalid request payload (repo_path, commit_hashes, or hash format).
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
        '500':
          description: Git execution failure or unexpected server error.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
